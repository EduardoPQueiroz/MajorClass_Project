<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MajorClass - Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>

    <div class="heroSection">
        <div class="loginContainer">
            <div class="titleContainer">
                <p class="loginTitle">Cadastro</p>
            </div>
            <div class="loginForm registerForm">
                <img src="img/logomarca.png" alt="">
                <div class="inputSection">
                    <div id="fieldError"></div>
                    <div class="inputField">
                        <p class="inpTitle">Nome: </p>
                        <input type="text" name="" id="nameInput" placeholder="Nome Sobrenome">
                    </div>
                    <div class="inputField">
                        <p class="inpTitle">Email: </p>
                        <input type="email" name="" id="emailInput" placeholder="email@email.com">
                    </div>
                    <div class="inputField">
                        <p class="inpTitle">Senha: </p>
                        <input type="password" name="" id="passInput" placeholder="********">
                    </div>
                    <div class="inputField">
                        <p class="inpTitle">Confirme sua senha: </p>
                        <input type="password" name="" id="confirmPassInput" placeholder="********">
                    </div>
                    <button onclick="cadastrar()">CADASTRAR</button>
                    <p class="linkPageText">Já tem uma conta?<a href="login.html">Entrar!</a></p>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
<script>

    function validaCampos() {
        let nomeVar = nameInput.value
        let emailVar = emailInput.value
        let passVar = passInput.value
        let confirmPassVar = confirmPassInput.value

        let camposEmBranco = nomeVar == '' || emailVar == '' || passVar == '' || confirmPassVar == ''

        let emailValido = emailVar.includes("@") && emailVar.includes(".") && emailVar.indexOf('@') < emailVar.lastIndexOf('.')

        let senhaValida = passVar == confirmPassVar

        let cadastro = false

        if (camposEmBranco) {
            fieldError.innerHTML = "Preencha todos os campos para realizar o cadastro!"
        } else if (!emailValido) {
            fieldError.innerHTML = "Email inválido inserido!"
        } else if (!senhaValida) {
            fieldError.innerHTML = "Os campos senha e confimar senha precisam ser iguais!"
        } else {
            cadastro = true
        }

        return cadastro
    }

    function cadastrar() {
        var nomeVar = nameInput.value;
        var emailVar = emailInput.value;
        var senhaVar = passInput.value;
        var confirmacaoSenhaVar = confirmPassInput.value;
        let camposValidados = validaCampos()
        if (camposValidados) {
            fetch("/professores/cadastrar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    nomeServer: nomeVar,
                    emailServer: emailVar,
                    senhaServer: senhaVar,
                }),
            })
                .then(function (resposta) {
                    console.log("resposta: ", resposta);

                    if (resposta.ok) {
                        fieldError.style.color = "#f4f4f4";

                        fieldError.innerHTML =
                            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

                        window.location.href='login.html'

                    } else {
                        throw "Houve um erro ao tentar realizar o cadastro!";
                    }
                })
                .catch(function (resposta) {
                    console.log(`#ERRO: ${resposta}`);
                });

            return false;
        }
    }
</script>
