<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MajorClass - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>

    <div class="heroSection">
        <div class="loginContainer">
            <div class="titleContainer">
                <p class="loginTitle">Login</p>
            </div>
            <div class="loginForm">
                <img src="img/logomarca.png" alt="">
                <div class="inputSection">
                    <div class="inputField">
                        <p class="inpTitle">Email: </p>
                        <input type="email" name="" id="emailInput" placeholder="exemplo@exemplo.com">
                    </div>
                    <div class="inputField">
                        <p class="inpTitle">Senha: </p>
                        <input type="password" name="" id="passInput" placeholder="********">
                    </div>
                    <button onclick="entrar()">ENTRAR</button>
                    <p class="linkPageText">Não tem uma conta? <a href="cadastro.html">Cadastre-se!</a></p>
                </div>
            </div>
        </div>
</body>
</html>
<script>
    function entrar(){
        window.location = './app/initialPage.html'
    }
</script>
