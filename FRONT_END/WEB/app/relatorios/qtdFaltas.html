<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAJORCLASSAPP - RELATÓRIOS</title>
    <link rel="stylesheet" href="../css/appStyle.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<body>
    <div class="header">
        <img src="../../img/LOGOIMAGE_INVERTIDO.png" alt="">
        <div class="linksContainer">
            <div class="navBarLink">
                <a href="../alunos/alunosPage.html">
                    <img src="../../img/User/Users.png" alt="">
                    <p>ALUNOS</p>
                </a>
            </div>
            <div class="navBarLink">
                <a href="../aulas/aulasPage.html">
                    <img src="../../img/Calendar/Calendar_Days.svg" alt="">
                    <p>AULAS</p>
                </a>
            </div>
            <div class="navBarLink">
                <a href="../relatorios/qtdAlunos.html">
                    <img src="../../img/Interface/Chart_Line.svg" alt="">
                    <p>RELATÓRIOS</p>
                </a>
            </div>
            <div class="exitButton">
                <a href="../../index.html">
                    <img src="../../img/Vector.png" alt="">
                    <span>SAIR</span>
                </a>
            </div>
        </div>
    </div>
    <div class="contentContainer">
        <div class="chartSection">
            <div class="kpisContainer">
                <div class="kpiCard">
                    <p>Total de aulas no último mês:</p>
                    <p class="responseKpi">35</p>
                </div>
                <div class="kpiCard">
                    <p>Total de faltas no último mês: </p>
                    <p class="responseKpi">10</p>
                </div>
                <div class="kpiCard">
                    <p>Aluno com mais faltas: </p>
                    <p class="responseKpi">Matheus Vizzas</p>
                </div>
            </div>
            <div class="chartContainer">
                <canvas id="chartQtdAlunos"></canvas>
            </div>
        </div>
        <div class="chartsMenu">
            <div class="chartLink" onclick="window.location.href='qtdAlunos.html'">
                <img src="../../img/Interface/Chart_Line.svg" alt="">
                <p>Quantidade de alunos</p>
            </div>
            <div class="chartLink" onclick="window.location.href='qtdAulas.html'">
                <img src="../../img/Interface/Chart_Line.svg" alt="">
                <p>Quantidade de aulas</p>
            </div>
            <div class="chartLink" >
                <img src="../../img/Interface/Chart_Line.svg" alt="">
                <p>Quantidade de faltas</p>
            </div>
            <div class="chartLink">
                <img src="../../img/Interface/Chart_Bar_Vertical_01.svg" alt="">
                <p>Quantidade de aulas / dia da semana</p>
            </div>
            <div class="chartLink">
                <img src="../../img/Interface/Chart_Bar_Vertical_01.svg" alt="">
                <p>Quantidade de alunos / intrumento</p>
            </div>
        </div>
    </div>

</body>

</html>
<script>
    const ctx = document.getElementById('chartQtdAlunos');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ["Abril", "Maio", "Junho", "Julho", "Agosto"],
            datasets: [{
                label: 'Quantidade de faltas',
                tension: 0.2,
                cubicInterpolationMode: 'monotone',
                data: [3, 0, 1, 5, 7],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 10
                }
            }
        }
    });
</script>
